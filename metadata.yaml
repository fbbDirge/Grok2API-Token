name: astrbot_plugin_Grok2API Token
display_name: Grok2API Token 监控
desc: 监控 Grok2API Token 号池状态，查看 Token 总数、正常/限流/失效数量及剩余配额
version: v1.0.0
author: 冰冰
repo: https://github.com/fbbDirge/Grok2API-Token

# 插件配置项（将显示在 AstBot 管理面板中）
config:
  - name: service_url
    label: Grok2API 服务地址
    description: "Grok2API 服务的完整地址，例如：http://your-server:8000"
    type: string
    default: ""
    required: true

  - name: service_password
    label: 管理员密码
    description: Grok2API 管理面板的密码（即 app.app_key 配置项）
    type: string
    default: ""
    required: true
